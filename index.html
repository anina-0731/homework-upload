<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妹妹的作业打卡与积分系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #ff7675;
            --secondary-color: #ffeaa7;
            --bg-color: #f7f1e3;
            --text-color: #2c3e50;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        h1, h2 {
            text-align: center;
            color: var(--primary-color);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        select, textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe4ea;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        select:focus, textarea:focus, input[type="text"]:focus {
            border-color: var(--primary-color);
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 5px 10px rgba(255, 118, 117, 0.3);
            transition: transform 0.2s, background-color 0.3s;
        }
        button:hover {
            background-color: #fab1a0;
            transform: translateY(-2px);
        }
        .card {
            background: #f1f2f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 5px solid var(--primary-color);
        }
        .score-board {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            color: #2ed573;
            margin: 20px 0;
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
        }
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .btn-review {
            padding: 10px;
            font-size: 14px;
            box-shadow: none;
        }
        .btn-excellent { background-color: #2ed573; box-shadow: 0 3px 6px rgba(46, 213, 115, 0.3); }
        .btn-good { background-color: #1e90ff; box-shadow: 0 3px 6px rgba(30, 144, 255, 0.3); }
        .btn-ok { background-color: #ffa502; box-shadow: 0 3px 6px rgba(255, 165, 2, 0.3); }
        .btn-bad { background-color: #ff4757; box-shadow: 0 3px 6px rgba(255, 71, 87, 0.3); }
    </style>
</head>
<body>

    <div class="container" id="mobile-view">
        <h1>🎒 妹妹的作业打卡</h1>
        <div class="score-board">当前总积分：<span id="current-score">0</span> 分</div>
        
        <div class="form-group">
            <label for="subject">选择学科：</label>
            <select id="subject">
                <option value="语文">📝 语文</option>
                <option value="数学">📐 数学</option>
                <option value="英语">🔤 英语</option>
                <option value="其他">🎨 其他学科</option>
            </select>
        </div>

        <div class="form-group">
            <label for="content">作业文本内容 / 打卡心情：</label>
            <textarea id="content" rows="4" placeholder="在这里写下今天的作业题目或心得..."></textarea>
        </div>

        <div class="form-group">
            <label for="image-url">作业图片链接 (选填)：</label>
            <input type="text" id="image-url" placeholder="可粘贴图片网盘链接或直接填纯文本打卡">
        </div>

        <button onclick="submitHomework()">🚀 提交打卡并累计打卡</button>

        <h2 style="margin-top: 30px;">💬 姐姐的最新回复</h2>
        <div id="reply-container" class="card">暂无新回复，继续加油哦！</div>
    </div>

    <div class="container" id="pc-view">
        <h1>🖥️ 姐姐的作业检查后台</h1>
        <button onclick="fetchHomework()" style="background-color: #2f3542; margin-bottom: 20px;">🔄 刷新作业列表</button>
        <div id="homework-list">加载中...</div>
    </div>

    <script>
        // ==========================================
        // 🌟 【核心配置区】 
        // ==========================================
        const SUPABASE_URL = 'https://onubrzrncwxvmqjiimcq.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhwdnBvZ3p1ZXZtc3J6cHB2bmZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NjY0ODYsImV4cCI6MjA5OTE0MjQ4Nn0.6QKsUX9nevlzjtDNUmaBpY603BQnoAme153gmw0av0s'; // <-- ⚠️ 请把以 eyJ 开头的长密钥粘贴在这两个单引号之间！

        // ==========================================
        // 🛠️ 【修复完成的 Supabase 初始化】 
        // ==========================================
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 初始化页面数据
        window.onload = function() {
            fetchScore();
            fetchLatestReply();
            fetchHomework();
        };

        // 1. 妹妹提交作业
        async function submitHomework() {
            const subject = document.getElementById('subject').value;
            const content = document.getElementById('content').value;
            const imageUrl = document.getElementById('image-url').value;

            if(!content.trim()) {
                alert("请输入作业内容哦！");
                return;
            }

            const { data, error } = await supabaseClient
                .from('homework')
                .insert([{ subject, content, image_url: imageUrl, status: '未回复' }]);

            if (error) {
                console.error("提交失败：", error);
                alert("打卡失败，请按 F12 查看控制台错误原因");
            } else {
                const encourages = ["太棒啦！又是进步的一天！🌟", "打卡成功！你离优秀更近一步啦！💪", "真厉害，今晚奖励自己休息一下吧！🎉"];
                alert(encourages[Math.floor(Math.random() * encourages.length)]);
                document.getElementById('content').value = '';
                document.getElementById('image-url').value = '';
                fetchHomework();
            }
        }

        // 2. 获取总积分
        async function fetchScore() {
            const { data, error } = await supabaseClient
                .from('total_score')
                .select('score')
                .single();
            
            if (data) {
                document.getElementById('current-score').innerText = data.score;
            }
        }

        // 3. 获取最新回复
        async function fetchLatestReply() {
            const { data, error } = await supabaseClient
                .from('homework')
                .select('reply, reward_type')
                .not('reply', 'is', null)
                .order('created_at', { ascending: false })
                .limit(1);

            if (data && data.length > 0) {
                document.getElementById('reply-container').innerHTML = `
                    <strong>评价等级：</strong> [${data[0].reward_type}]<br>
                    <strong>答疑回复：</strong> ${data[0].reply}
                `;
            }
        }

        // 4. 电脑端：拉取所有作业
        async function fetchHomework() {
            const { data, error } = await supabaseClient
                .from('homework')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                document.getElementById('homework-list').innerText = "加载失败，请检查配置。";
                return;
            }

            let html = '';
            data.forEach(item => {
                const time = new Date(item.created_at).toLocaleString();
                html += `
                    <div class="card">
                        <h3>【${item.subject}】提交时间：${time}</h3>
                        <p><strong>内容：</strong>${item.content}</p>
                        ${item.image_url ? `<p><strong>图片：</strong><a href="${item.image_url}" target="_blank">点击查看图片</a></p>` : ''}
                        <p><strong>当前状态：</strong> ${item.status} (${item.reward_type || '未评分'})</p>
                        ${item.reply ? `<p style="color: #666;"><strong>已回复：</strong>${item.reply}</p>` : `
                            <div class="form-group">
                                <input type="text" id="reply-text-${item.id}" placeholder="写点评价或答疑吧...">
                            </div>
                            <div class="btn-group">
                                <button class="btn-review btn-excellent" onclick="reviewHomework(${item.id}, '优秀', 5)">优秀 (+5分)</button>
                                <button class="btn-review btn-good" onclick="reviewHomework(${item.id}, '不错哦', 3)">不错哦 (+3分)</button>
                                <button class="btn-review btn-ok" onclick="reviewHomework(${item.id}, 'okk', 1)">okk (+1分)</button>
                                <button class="btn-review btn-bad" onclick="reviewHomework(${item.id}, '不中嘞', -2)">不中嘞 (-2分)</button>
                            </div>
                        `}
                    </div>
                `;
            });
            document.getElementById('homework-list').innerHTML = html || '妹妹今天还没有提交任何作业哦~';
        }

        // 5. 电脑端：批改作业并更新积分
        async function reviewHomework(id, type, points) {
            const replyText = document.getElementById(`reply-text-${id}`).value;
            if(!replyText.trim()) {
                alert("请先填写回复内容再点击评分按钮！");
                return;
            }

            // A. 更新作业状态
            const { error: err1 } = await supabaseClient
                .from('homework')
                .update({ reply: replyText, status: '已回复', reward_type: type })
                .eq('id', id);

            if(err1) { alert("评分失败"); return; }

            // B. 获取当前分数并叠加积分
            const { data: scoreData } = await supabaseClient.from('total_score').select('score').single();
            let currentScore = scoreData ? scoreData.score : 0;
            let newScore = currentScore + points;

            const { error: err2 } = await supabaseClient
                .from('total_score')
                .update({ score: newScore })
                .eq('id', 1); // 假设表里只有一行 id 为 1 的总分数据

            if(!err2) {
                alert(`评分成功！妹妹获得了 [${type}] 评价，积攒了 ${points} 分！`);
                fetchHomework();
                fetchScore();
            }
        }
    </script>
</body>
</html>
